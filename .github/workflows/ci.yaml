name: Run tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  pytest:
    name: Pytest Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -e .[test]
          pip install pytest pytest-cov pytest-repeat pytest-rerunfailures tomli

      - name: Run pytest
        run: |
          pytest

  bootstrap:
    name: Bootstrap Integration Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -e .[test]

      - name: Build and test colcon-core
        run: |
          # Build colcon-core from source using its own bin/colcon script
          python bin/colcon build --paths .
          python bin/colcon test --paths . --return-code-on-test-failure

      - name: Verify installation
        run: |
          source install/local_setup.sh
          colcon --help
